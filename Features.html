<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <script type="text/javascript">
      function keyPress() {
        document.body.style.background = "blue";
      }
      function keydown() {
        document.body.style.background = "silver";
      }
      function keyUp() {
        document.body.style.background = "skyblue";
      }
      function keyDown() {
        document.body.style.background = "gray";
      }
      function keypress() {
        document.body.style.background = "black";
      }
      function keyup() {
        document.body.style.background = "brown";
      }
      function myfunction() {
        alert();
      }
      function mouseover() {
        document.body.style.background = "orange";
      }
      function mouseout() {
        document.body.style.background = "White";
      }
      function Mouseover() {
        document.body.style.background = "silver";
      }
      function Mouseout() {
        document.body.style.background = "White";
      }
      function MouseOver() {
        document.body.style.background = "green";
      }
      function MouseOut() {
        document.body.style.background = "White";
      }
      function mousemove() {
        document.body.style.background = "black";
      }
      function mouseleave() {
        document.body.style.background = "white";
      }
      function mousedown() {
        document.body.style.background = "pink";
      }
    </script>
    <style>
      form {
        position: absolute;
        left: 500px;
        top: 200px;
        /* padding-left: 50px;
            padding-bottom: 50px; */
        padding: 35px;
      }
    </style>
  </head>
  <body>
    <strong></strong>
    <hr
      style="padding: 10px; border-radius: 50px"
      color="orange"
      onmouseover="mouseover()"
      onmouseout="mouseout()"
    />
    <hr
      style="padding: 10px; border-radius: 50px"
      color="white"
      onmouseover="Mouseover()"
      onmouseout="Mouseout()"
    />
    <hr
      style="padding: 10px; border-radius: 50px"
      color="green"
      onmouseover="MouseOver()"
      onmouseout="MouseOut()"
    />

    <form
      action="success_next.html"
      method="get"
      style="
        background-color: rgb(226, 226, 226);
        border-radius: 50px;
        height: auto;
        width: 350px;
      "
      onmousemove="mousemove()"
      onmouseleave="mouseleave()"
    >
      <fieldset
        style="
          color: brown;
          border-color: blue;
          border-style: double;
          border-radius: 7px;
        "
      >
        <legend
          style="font-style: normal; font-size: large; text-align: justify"
          onmousedown="mousedown()"
        >
          Regisation-form
        </legend>

        <label for=" First Name "> First Name </label
        ><input
          type="text"
          name="firstname"
          placeholder="enter name"
          onkeypress="keyPress()"
        /><br /><br />
        <label for=" last name "> Last name </label
        ><input
          type="text"
          name="firstname"
          placeholder="enter last name"
          onkeydown="keydown()"
        /><br /><br />
        <label for=" Email Id "> Email Id </label
        ><input
          type="gmail"
          name="Address"
          placeholder="enter email address"
          onkeyup="keyUp()"
        /><br /><br />
        <label for=" User name">User Name</label
        ><input
          type="text"
          name="user Name"
          placeholder="enter user name"
          onkeydown="keyDown()"
        /><br /><br />
        <label for=" password">password</label
        ><input
          type="text"
          name="Password"
          placeholder="enter password"
          onkeypress="keypress()"
        /><br /><br />

        <label for="Gender">Gender: </label>
        <input type="radio" name="Gender" value="Male" >Male
        <input type="radio" name="Gender" value="Female" >Female
        <input type="radio" name="Gender" value="Other" />Other 
        <br /><br />
        <label for="Addreess">Address</label
        ><textarea name="" id="" cols="" rows="" onkeyup="keyup()"></textarea
        ><br /><br />
        <input
          type="submit"
          value="submit"
          style="text-align: center; margin-left: 90px"
          onclick="myfunction()"
        />
      </fieldset>
    </form>
  </body>
